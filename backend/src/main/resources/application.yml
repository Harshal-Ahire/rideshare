spring:
  application:
    name: rideshare
  datasource:
    url: jdbc:postgresql://localhost:5432/rideshare_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # For development - auto create/update tables
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: localhost
    port: 6379

  # For production on Render, these will be overridden by environment variables

server:
  port: 8080

# Custom application properties
app:
  jwt:
    secret: your-super-secret-jwt-key-change-in-production
  ride:
    default-base-fare: 2.5
    per-km-rate: 1.2